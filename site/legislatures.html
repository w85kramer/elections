  .badge-d { background: #6cb3d2; color: white; }

  .comp-bar {

  @media (max-width: 768px) {
    .leg-stats { grid-template-columns: repeat(2, 1fr); }
    .chamber-details { grid-template-columns: 1fr; }
    .map-embed { height: 500px; }

<script>
(async function() {
  const data = await loadJSON('data/legislatures_data.json');
  const chambers = data.chambers;
  const summary = data.summary;

  var _gd = document.getElementById('gen-date') || document.getElementById('gen-date-footer'); if (_gd) _gd.textContent = formatDate(data.generated_at.split('T')[0]);

  // Stats
  document.getElementById('stat-chambers').textContent = summary.chambers_with_elections_2026;
  document.getElementById('stat-seats').textContent = numberWithCommas(summary.seats_up_2026);
  document.getElementById('stat-dem').textContent = summary.d_chambers;
  document.getElementById('stat-gop').textContent = summary.r_chambers;
  const closeMargins = chambers.filter(c => Math.abs(c.margin) <= 5 && c.control_status !== 'Nonpartisan').length;
  document.getElementById('stat-close').textContent = closeMargins;

  // Rating colors and order (used by both map and bar chart)
  const RATING_COLORS = {
    'Solid D': '#1a4a63', 'Likely D': '#4a8fad', 'Lean D': '#6cb3d2',
    'Toss-Up': '#f5c542',
    'Lean R': '#e86987', 'Likely R': '#e50963', 'Solid R': '#9e063f',
    'Likely Coalition': '#7b3f9e',
    'Not Rated': '#c8c8c8', 'No Chamber': '#e4e4e4'
  };
  const RATING_ORDER = ['Solid D', 'Likely D', 'Lean D', 'Toss-Up', 'Lean R', 'Likely R', 'Solid R', 'Likely Coalition'];
  const RATING_TIPS = {
    'Solid D': 'Not competitive — Democrats are overwhelmingly favored to hold the chamber',
    'Likely D': 'Democrats favored — not expected to flip, but minority party could gain seats',
    'Lean D': 'Tilts Democratic but competitive — chamber could go either way',
    'Toss-Up': 'True toss-up — either party could win control',
    'Lean R': 'Tilts Republican but competitive — chamber could go either way',
    'Likely R': 'Republicans favored — not expected to flip, but minority party could gain seats',
    'Solid R': 'Not competitive — Republicans are overwhelmingly favored to hold the chamber',
    'Likely Coalition': 'Bipartisan coalition favored to maintain control',
    'Not Rated': 'Chamber has 2026 elections but no forecast rating yet',
    'No Chamber': 'State has a unicameral legislature (no separate senate/house)'
  };

  // Build per-chamber-type map data
  const ALL_STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];
  var stateNames = {};
  var chamberByType = { Senate: {}, House: {} };
  for (var i = 0; i < chambers.length; i++) {
    var ch = chambers[i];
    stateNames[ch.state] = ch.state_name;
    var type = (ch.chamber === 'Senate' || ch.chamber === 'Legislature') ? 'Senate' : 'House';
    chamberByType[type][ch.state] = ch;
  }

  function buildMapData(chamberType) {
    var mapData = {};
    var counts = { notRated: 0, noChamber: 0 };
    for (var j = 0; j < ALL_STATES.length; j++) {
      var st = ALL_STATES[j];
      var ch = chamberByType[chamberType][st];
      if (ch && ch.forecast_rating) {
        mapData[st] = { category: ch.forecast_rating, info: { name: stateNames[st], rating: ch.forecast_rating, chamber: ch.chamber } };
      } else if (ch) {
        counts.notRated++;
        mapData[st] = { category: 'Not Rated', info: { name: stateNames[st], rating: 'Not Rated', chamber: ch.chamber } };
      } else {
        counts.noChamber++;
        mapData[st] = { category: 'No Chamber', info: { name: stateNames[st] || st, rating: 'No Chamber' } };
      }
    }
    return { mapData: mapData, counts: counts };
  }

  function buildMapLegend(mapData) {
    var legend = RATING_ORDER.filter(function(r) {
      return ALL_STATES.some(function(s) { return mapData[s] && mapData[s].category === r; });
    }).map(function(r) { return { label: r, color: RATING_COLORS[r], tooltip: RATING_TIPS[r] }; });
    if (ALL_STATES.some(function(s) { return mapData[s] && mapData[s].category === 'Not Rated'; }))
      legend.push({ label: 'Not Rated', color: '#c8c8c8', tooltip: RATING_TIPS['Not Rated'] });
    if (ALL_STATES.some(function(s) { return mapData[s] && mapData[s].category === 'No Chamber'; }))
      legend.push({ label: 'No Chamber', color: '#e4e4e4', tooltip: RATING_TIPS['No Chamber'] });
    return legend;
  }

  function mapTooltip(abbr, info) {
    if (!info.name) return '';
    if (info.rating === 'No Chamber') return '<strong>' + info.name + '</strong><br>Unicameral legislature';
    if (info.rating === 'Not Rated') return '<strong>' + info.name + '</strong><br>' + info.chamber + '<br>No forecast rating';
    return '<strong>' + info.name + '</strong><br>' + info.chamber + '<br>Forecast: ' + info.rating;
  }

  // Initialize map with Senate view
  var senateData = buildMapData('Senate');
  var mapInstance = new MapRenderer('#page-map', {
    data: senateData.mapData,
    colors: RATING_COLORS,
    defaultColor: '#e4e4e4',
    legend: buildMapLegend(senateData.mapData),
    tooltipFn: mapTooltip
  });

  function buildRatingsBar(chamberType) {
    var ratingCounts = {};
    var ratingStates = {};
    var subset = chamberType === 'Senate' ? chambers.filter(function(c) { return c.chamber === 'Senate' || c.chamber === 'Legislature'; }) : chambers.filter(function(c) { return c.chamber !== 'Senate' && c.chamber !== 'Legislature'; });
    for (var k = 0; k < subset.length; k++) {
      if (subset[k].forecast_rating) {
        var fr = subset[k].forecast_rating;
        ratingCounts[fr] = (ratingCounts[fr] || 0) + 1;
        if (!ratingStates[fr]) ratingStates[fr] = [];
        ratingStates[fr].push(subset[k].state);
      }
    }
    var notRated = subset.filter(function(c) { return !c.forecast_rating; });
    var notRatedStates = notRated.map(function(c) { return c.state; });

    var bar = document.getElementById('ratings-bar');
    var legend = document.getElementById('ratings-legend');
    bar.innerHTML = '';
    legend.innerHTML = '';
    for (var m = 0; m < RATING_ORDER.length; m++) {
      var rating = RATING_ORDER[m];
      var count = ratingCounts[rating] || 0;
      if (count === 0) continue;
      var states = (ratingStates[rating] || []).sort().join(', ');
      var seg = document.createElement('div');
      seg.style.flex = count;
      seg.style.background = RATING_COLORS[rating];
      seg.textContent = count;
      seg.title = rating + ': ' + states;
      bar.appendChild(seg);
      legend.innerHTML += '<span><span class="swatch" style="background:' + RATING_COLORS[rating] + '"></span>' + rating + ' (' + count + ')</span>';
    }
    if (notRated.length > 0) {
      var seg2 = document.createElement('div');
      seg2.style.flex = notRated.length;
      seg2.style.background = '#c8c8c8';
      seg2.style.color = '#666';
      seg2.textContent = notRated.length;
      seg2.title = 'Not Rated: ' + notRatedStates.sort().join(', ');
      bar.appendChild(seg2);
      legend.innerHTML += '<span><span class="swatch" style="background:#c8c8c8"></span>Not Rated (' + notRated.length + ')</span>';
    }
  }

  // Initial bar chart for Senate
  buildRatingsBar('Senate');

  // Tab switching
  window.switchMapTab = function(chamberType) {
    var result = buildMapData(chamberType);
    mapInstance.recolor(result.mapData, RATING_COLORS);
    mapInstance.updateLegend(buildMapLegend(result.mapData));
    buildRatingsBar(chamberType);
    // Toggle button styles
    var senBtn = document.getElementById('map-tab-senate');
    var houseBtn = document.getElementById('map-tab-house');
    if (chamberType === 'Senate') {
      senBtn.style.background = 'var(--ms-navy)'; senBtn.style.color = '#fff';
      houseBtn.style.background = '#fff'; houseBtn.style.color = 'var(--ms-navy)';
    } else {
      houseBtn.style.background = 'var(--ms-navy)'; houseBtn.style.color = '#fff';
      senBtn.style.background = '#fff'; senBtn.style.color = 'var(--ms-navy)';
    }
  };

  // Rating filter options
  const ratingSel = document.getElementById('filter-rating');
  for (const rating of RATING_ORDER) {
    if (ratingCounts[rating]) {
      const opt = document.createElement('option');
      opt.value = rating;
      opt.textContent = rating + ' (' + ratingCounts[rating] + ')';
      ratingSel.appendChild(opt);
    }
  }

  function controlBadge(ctrl) {
    if (ctrl === 'D') return '<span class="chamber-badge badge-d">DEM</span>';
    if (ctrl === 'R') return '<span class="chamber-badge badge-r">GOP</span>';
    if (ctrl === 'Coalition') return '<span class="chamber-badge badge-coalition">Coalition</span>';
    if (ctrl === 'Tied') return '<span class="chamber-badge badge-tied">Tied</span>';
    return '<span class="chamber-badge badge-coalition">' + ctrl + '</span>';
  }

  function forecastBadge(forecast) {
    if (!forecast) return '';
    const cls = 'badge-' + forecast.toLowerCase().replace(/\s+/g, '-');
    return '<span class="chamber-badge ' + cls + '">' + forecast + '</span>';
  }

  function isLowerChamber(c) {
    return c.chamber !== 'Senate';
  }

  // Competitiveness sort order
  const ratingSort = {
    'Toss-Up': 0, 'Lean D': 1, 'Lean R': 1,
    'Likely D': 2, 'Likely R': 2,
    'Solid D': 3, 'Solid R': 3
  };

  function getFiltered() {
    const search = document.getElementById('filter-search').value.toLowerCase();
    const chamber = document.getElementById('filter-chamber').value;
    const control = document.getElementById('filter-control').value;
    const rating = document.getElementById('filter-rating').value;

    return chambers.filter(c => {
      if (search && !c.state_name.toLowerCase().includes(search) && !c.state.toLowerCase().includes(search)) return false;
      if (chamber === 'Senate' && c.chamber !== 'Senate') return false;
      if (chamber === 'Lower' && c.chamber === 'Senate') return false;
      if (control === 'D' && c.control_status !== 'D') return false;
      if (control === 'R' && c.control_status !== 'R') return false;
      if (control === 'Other' && c.control_status !== 'Coalition' && c.control_status !== 'Tied' && c.control_status !== 'Nonpartisan' && c.control_status !== 'Power_Sharing') return false;
      if (rating && c.forecast_rating !== rating) return false;
      return true;
    });
  }

  function render() {
    const filtered = getFiltered();
    const list = document.getElementById('chambers-list');
    const countEl = document.getElementById('results-count');

    // Sort: competitive first, then alphabetical
    filtered.sort((a, b) => {
      const aR = ratingSort[a.forecast_rating] ?? 99;
      const bR = ratingSort[b.forecast_rating] ?? 99;
      if (aR !== bR) return aR - bR;
      if (a.state !== b.state) return a.state.localeCompare(b.state);
      return a.chamber.localeCompare(b.chamber);
    });

    if (filtered.length === chambers.length) {
      countEl.textContent = 'Showing all ' + filtered.length + ' chambers';
    } else {
      countEl.textContent = 'Showing ' + filtered.length + ' of ' + chambers.length + ' chambers';
    }

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">No chambers match the current filters.</div>';
      return;
    }

    let html = '';
    for (const c of filtered) {
      const chamberLabel = getChamberLabel(c.state, c.chamber);
      const title = c.state_name + ' ' + chamberLabel;

      // Composition bar
      const total = c.total_seats;
      let compBar = '<div class="comp-bar">';
      if (c.d_seats > 0) {
        const pct = (c.d_seats / total * 100).toFixed(1);
        compBar += '<div style="flex:' + c.d_seats + ';background:#6cb3d2">' + (pct > 8 ? c.d_seats : '') + '</div>';
      }
      if (c.other_seats > 0) {
        compBar += '<div style="flex:' + c.other_seats + ';background:#8b567f">' + (c.other_seats > 2 ? c.other_seats : '') + '</div>';
      }
      if (c.vacant_seats > 0) {
        compBar += '<div style="flex:' + c.vacant_seats + ';background:#ccc">' + (c.vacant_seats > 2 ? c.vacant_seats : '') + '</div>';
      }
      if (c.r_seats > 0) {
        const pct = (c.r_seats / total * 100).toFixed(1);
        compBar += '<div style="flex:' + c.r_seats + ';background:#e50963">' + (pct > 8 ? c.r_seats : '') + '</div>';
      }
      compBar += '</div>';

      // Details
      let details = '';
      details += '<span><span class="detail-label">Total Seats:</span> ' + total + '</span>';
      details += '<span><span class="detail-label">Majority:</span> ' + c.majority_threshold + '</span>';
      details += '<span><span class="detail-label">Margin:</span> ' + (c.margin >= 0 ? '+' : '') + c.margin + '</span>';
      if (c.has_elections_2026) {
        details += '<span><span class="detail-label">Seats Up:</span> ' + c.seats_up_2026 + '</span>';
        details += '<span><span class="detail-label">Candidate Filing Deadline:</span> ' + (c.filing_deadline ? formatDateShort(c.filing_deadline) : '—') + '</span>';
        details += '<span><span class="detail-label">Primary:</span> ' + (c.primary_date ? formatDateShort(c.primary_date) : '—') + '</span>';
      } else {
        details += '<span><span class="detail-label">2026:</span> No seats up</span>';
      }

      // Supermajority note
      let noteHtml = '';
      if (c.has_supermajority) {
        const party = c.control_status === 'R' ? 'Republicans' : 'Democrats';
        noteHtml = '<div class="chamber-note">' + party + ' hold a veto-override supermajority' + (c.supermajority && c.supermajority.veto_override ? ' (' + c.supermajority.veto_override + ')' : '') + '</div>';
      }
      if (c.coalition_desc) {
        noteHtml += '<div class="chamber-note">' + c.coalition_desc + '</div>';
      }

      html += '<div class="chamber-card">' +
        '<div class="chamber-header">' +
          '<a href="state.html?st=' + c.state + '" class="chamber-name">' + title + '</a>' +
          controlBadge(c.control_status) +
          forecastBadge(c.forecast_rating) +
          (c.has_supermajority ? '<span class="chamber-badge badge-supermajority">Supermajority</span>' : '') +
        '</div>' +
        compBar +
        '<div class="chamber-details">' + details + '</div>' +
        noteHtml +
      '</div>';
    }
    list.innerHTML = html;
  }

  render();
  document.getElementById('filter-search').addEventListener('input', render);
  document.getElementById('filter-chamber').addEventListener('change', render);
  document.getElementById('filter-control').addEventListener('change', render);
  document.getElementById('filter-rating').addEventListener('change', render);
})();
</script>
</body>
</html>
