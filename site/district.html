<meta name="twitter:description" content="Comprehensive district-level election data including partisan trends, office history, and candidate information.">
<link rel="canonical" href="https://www.multistate.us/elections/district.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700;800&family=Merriweather:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  /* 2026 Election highlight */
  .election-2026-card {
    border-left: 4px solid var(--ms-navy) !important;
    background: linear-gradient(135deg, #f8fbfd 0%, #fff 100%) !important;
  }
  /* Hero */
  .district-hero { margin-bottom: 32px; }
  .district-title {
    font-weight: 800;
    font-size: 38px;
    color: var(--ms-navy);
    line-height: 1.1;
  }
  .district-subtitle {
    font-size: 16px;
    font-weight: 400;
    color: var(--ms-text-light);
    margin-top: 4px;
  }
  .holder-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    font-size: 16px;
  }
  .holder-name {
    font-weight: 700;
    font-size: 18px;
  }
  .holder-since {
    font-size: 14px;
    color: var(--ms-text-light);
  }
  .quick-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 24px;
    margin-top: 12px;
    font-size: 14px;
    color: var(--ms-text-light);
  }
  .quick-stats .qs-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .quick-stats .qs-label { font-weight: 600; color: var(--ms-navy); }
  .lean-indicator {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  /* Partisan trend chart */
  .trend-chart-wrap {
    background: #f8f9fa;
    border-radius: var(--ms-radius);
    padding: 16px 20px;
    overflow-x: auto;
  }
  .trend-chart-wrap svg { display: block; }

  /* 2026 Election card */
  .election-2026-card {
    border-left: 4px solid var(--ms-gold);
  }
  .election-2026-card .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .election-2026-card .candidate-list {
    list-style: none;
    padding: 0;
    margin: 12px 0 0;
  }
  .election-2026-card .candidate-list li {
    padding: 4px 0;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .incumbent-marker {
    font-size: 11px;
    color: var(--ms-text-light);
    font-style: italic;
  }
  .recount-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #b45309;
    background: #fef3c7;
    border: 1px solid #f59e0b;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 4px;
    cursor: help;
  }
  .close-race-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #6b21a8;
    background: #f3e8ff;
    border: 1px solid #a855f7;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 4px;
    cursor: help;
  }
  .runoff-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #9a3412;
    background: #fff7ed;
    border: 1px solid #fb923c;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 4px;
    cursor: help;
  }
  .flip-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #065f46;
    background: #ecfdf5;
    border: 1px solid #34d399;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 4px;
    cursor: help;
  }
  .incumbent-defeated-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #991b1b;
    background: #fef2f2;
    border: 1px solid #f87171;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 4px;
    cursor: help;
  }
  .forecast-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 3px;
    margin-left: 8px;
  }
  .forecast-tossup { background: #fff3cd; color: #856404; }
  .forecast-lean-d { background: #d1ecf1; color: #0c5460; }
  .forecast-lean-r { background: #f8d7da; color: #721c24; }
  .forecast-likely-d { background: #a8d8ea; color: #043858; }
  .forecast-likely-r { background: #f5b7b1; color: #78281f; }
  .forecast-solid-d { background: var(--ms-dem-blue); color: white; }
  .forecast-solid-r { background: var(--ms-rep-red); color: white; }

  /* Election history timeline */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #ddd;
  }
  .timeline-year {
    font-weight: 700;
    font-size: 18px;
    color: var(--ms-navy);
    padding: 16px 0 8px;
    position: relative;
  }
  .timeline-year::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 22px;
    width: 10px;
    height: 10px;
    background: var(--ms-navy);
    border-radius: 50%;
  }
  .timeline-entry {
    position: relative;
    margin-bottom: 12px;
    border: 1px solid var(--ms-border);
    border-radius: var(--ms-radius);
    overflow: hidden;
  }
  .timeline-entry::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 18px;
    width: 8px;
    height: 8px;
    background: #bbb;
    border-radius: 50%;
  }
  .timeline-entry.entry-has-winner::before { background: #28a745; }
  .timeline-entry.entry-pending::before { background: var(--ms-gold); }
  .timeline-entry.entry-has-winner:not(.primary-muted) { background: rgba(40, 167, 69, 0.03); }

  /* Entry styling by type */
  .timeline-entry.entry-general { border-left: 4px solid var(--ms-navy); }
  .timeline-entry.entry-special { border-left: 4px solid var(--ms-navy); }
  .timeline-entry.entry-primary { border-left: 4px solid #ccc; }
  .timeline-entry.entry-upcoming { border-left: 4px solid var(--ms-gold); }

  .entry-header {
    padding: 10px 14px;
    font-size: 13px;
    color: var(--ms-text-light);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .entry-type {
    font-weight: 700;
    color: var(--ms-navy);
  }

  /* Candidate rows inside timeline entry */
  .entry-candidates {
    padding: 0 14px 10px;
  }
  .entry-cand-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto auto;
    gap: 8px;
    align-items: center;
    padding: 3px 0;
    font-size: 13px;
  }
  .entry-cand-row.winner-row {
    font-weight: 700;
    background: rgba(4, 56, 88, 0.03);
    margin: 0 -14px;
    padding: 4px 14px;
  }
  .cand-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cand-name a {
    color: inherit;
    text-decoration: none;
  }
  .cand-name a:hover { text-decoration: underline; }
  .cand-pct { text-align: right; font-weight: 600; min-width: 50px; }
  .cand-votes { text-align: right; color: var(--ms-text-light); min-width: 60px; font-size: 12px; }
  .cand-result { text-align: right; min-width: 40px; font-size: 12px; }
  .cand-result-won { color: #28a745; font-weight: 700; }
  .cand-result-lost { color: var(--ms-rep-red); }

  .expand-btn {
    cursor: pointer;
    font-size: 11px;
    color: var(--ms-dem-blue);
    border: none;
    background: none;
    padding: 4px 4px 2px;
    font-weight: 600;
  }
  .expand-btn:hover { text-decoration: underline; }
  .cand-hidden { display: none; }
  .cand-hidden.open { display: grid; }

  .primary-muted { opacity: 0.7; }
  .primary-muted .entry-header { color: #999; }
  .primary-muted .entry-type { color: #888; font-weight: 600; }

  /* Timeline event cards */
  .timeline-event {
    position: relative;
    margin-bottom: 12px;
    padding: 8px 14px;
    border-radius: var(--ms-radius);
    font-size: 13px;
    font-style: italic;
  }
  .timeline-event::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 14px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .timeline-event.party-switch-event {
    background: #fff8e1;
    border-left: 3px solid #f5a623;
  }
  .timeline-event.party-switch-event::before { background: #f5a623; }
  .timeline-event.term-event {
    background: #f0f0f0;
    border-left: 3px solid #999;
    color: #555;
  }
  .timeline-event.term-event::before { background: #999; }
  .timeline-event.term-arrival {
    background: #e8f4e8;
    border-left: 3px solid #5a9e5a;
    color: #444;
  }
  .timeline-event.term-arrival::before { background: #5a9e5a; }
  .term-event-reason {
    font-weight: 600;
    color: #666;
  }
  .term-event-notes {
    font-size: 11px;
    color: #888;
    font-style: normal;
  }
  .timeline-event.redistricting-event {
    background: #e8f0fe;
    border-left: 3px dashed var(--ms-navy);
    font-style: normal;
    color: var(--ms-navy);
  }
  .timeline-event.redistricting-event::before { background: var(--ms-navy); }
  .redistricting-label {
    font-weight: 700;
    font-size: 13px;
  }
  .redistricting-detail {
    font-size: 11px;
    color: var(--ms-text-light);
    font-weight: 400;
  }

  /* Similar districts */
  .similar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .similar-card {
    padding: 14px;
    text-decoration: none;
    color: var(--ms-text);
    transition: transform 0.15s, box-shadow 0.15s;
    display: block;
  }
  .similar-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .similar-card .sim-name { font-weight: 700; font-size: 14px; }
  .similar-card .sim-state { font-size: 12px; color: var(--ms-text-light); }
  .similar-card .sim-margin { font-size: 13px; font-weight: 600; margin-top: 4px; }

  /* District map */
  #district-map {
    height: 350px;
    border-radius: var(--ms-radius);
    border: 1px solid var(--ms-border);
  }

  /* Prev/Next nav */
  .district-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--ms-border);
    font-size: 14px;
  }
  .district-nav a {
    color: var(--ms-dem-blue);
    text-decoration: none;
    font-weight: 600;
  }
  .district-nav a:hover { text-decoration: underline; }

  /* Multi-member holders */
  .holders-list { margin-top: 8px; }
  .holders-list .holder-row { margin-top: 6px; }

  /* Seat tabs for multi-member */
  .seat-tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--ms-border);
    margin-bottom: 16px;
  }
  .seat-tab {
    padding: 8px 16px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    color: var(--ms-text-light);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .seat-tab.active {
    color: var(--ms-navy);
    border-bottom-color: var(--ms-navy);
  }
  .seat-tab:hover { color: var(--ms-navy); }
  .seat-panel { display: none; }
  .seat-panel.active { display: block; }

  .error-msg {
    text-align: center;
    padding: 80px 20px;
    color: var(--ms-text-light);
  }
  .error-msg h2 { color: var(--ms-navy); margin-bottom: 12px; }

  @media (max-width: 768px) {
    .district-title { font-size: 28px; }
    .quick-stats { flex-direction: column; gap: 4px; }
    .similar-grid { grid-template-columns: 1fr; }
    #district-map { height: 250px; }
    .entry-cand-row {
      grid-template-columns: auto 1fr auto auto;
      font-size: 12px;
    }
    .cand-votes { display: none; }
  }
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="global-nav"></div>
<div class="page-container" id="main-content" role="main">
  <div id="topic-subnav"></div>
  <!-- Breadcrumb -->
  <div class="breadcrumb" id="breadcrumb">
    <a href="index.html">Home</a> &rsaquo; <span>Loading...</span>
  </div>

  <!-- Content -->
  <div id="page-content"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<div id="global-footer"></div>
<script src="js/nav.js"></script>
<script src="js/common.js"></script>
<script src="js/supabase.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const stateAbbr = (params.get('st') || '').toUpperCase();
  const chamber = params.get('chamber') || '';
  const distNum = params.get('d') || '';
  const content = document.getElementById('page-content');
  const tt = initTooltip(document.getElementById('tooltip'));

  if (!stateAbbr || !STATE_NAMES[stateAbbr] || !chamber || !distNum) {
    content.innerHTML = `<div class="error-msg"><h2>District Not Found</h2>
      <p>Please select a district from a <a href="index.html#states">state page</a>.</p></div>`;
    return;
  }

  const stateName = STATE_NAMES[stateAbbr];

  let data;
  try {
    data = await loadJSON(`data/districts/${stateAbbr}.json`);
  } catch (e) {
    content.innerHTML = `<div class="error-msg"><h2>${stateName}</h2>
      <p>District data not available. Please try again later.</p></div>`;
    return;
  }

  // Find the matching district
  const district = data.districts.find(d =>
    d.chamber === chamber && d.district_number === distNum
  );

  if (!district) {
    content.innerHTML = `<div class="error-msg"><h2>District Not Found</h2>
      <p>${chamber} District ${distNum} was not found for ${stateName}.</p>
      <p><a href="state.html?st=${stateAbbr}">Back to ${stateName}</a></p></div>`;
    return;
  }

  // --- Live data: fetch uncertified 2026 elections from Supabase ---
  const isEliminated = district.eliminated || false;
  const seatIds = district.seats.map(s => s.seat_id).filter(Boolean);
  let liveDataApplied = false;

  if (!isEliminated && needsLiveData(district)) {
    try {
      let liveElections = getCachedLiveData(seatIds);
      if (!liveElections) {
        liveElections = await fetchLiveElections(seatIds);
        setCachedLiveData(seatIds, liveElections);
      }
      if (liveElections && liveElections.length > 0) {
        mergeLiveElections(district, liveElections, stateAbbr);
        liveDataApplied = true;
      }
    } catch (err) {
      console.warn('Live data fetch failed, using static:', err.message);
    }
  }

  // Set page title
  const displayName = district.district_name || `${chamber} ${distNum}`;
  const fullLabel = `${stateName} ${getChamberLabel(stateAbbr, chamber)} District ${distNum}`;
  document.title = `${displayName} — ${stateName} | MultiState Elections`;
  var _gd = document.getElementById('gen-date') || document.getElementById('gen-date-footer'); if (_gd) _gd.textContent = formatDate(data.generated_at.split('T')[0]);
  if (liveDataApplied) {
    var _gd2 = document.getElementById('gen-date') || document.getElementById('gen-date-footer'); if (_gd2) _gd2.innerHTML =
      formatDate(data.generated_at.split('T')[0]) +
      ' <span title="2026 election data loaded live from database" style="color:var(--ms-gold);font-weight:600;cursor:help">\u25CF Live</span>';
  }

  // Breadcrumb
  var _bc = document.getElementById('breadcrumb'); if (_bc) _bc.innerHTML = `
    <a href="index.html">Home</a> &rsaquo;
    <a href="state.html?st=${stateAbbr}">${stateName}</a> &rsaquo;
    <a href="state.html?st=${stateAbbr}">${getChamberLabel(stateAbbr, chamber)}</a> &rsaquo;
    <span>${displayName}</span>`;

  // Helper: party color style string — use caucus for coloring when available
  function partyColorStyle(p) {
    if (p === 'D') return 'color:var(--ms-dem-blue)';
    if (p === 'R') return 'color:var(--ms-rep-red)';
    if (p === 'G') return 'color:#2e8b57';
    if (p === 'NP') return 'color:var(--ms-gold)';
    if (!p) return 'color:var(--ms-other)';
    return 'color:var(--ms-purple)';
  }

  // Build caucus annotation text
  // rawCaucus is the DB caucus value before effective-party mapping (e.g. 'C' for AK coalition)
  function caucusAnnotation(party, caucus, rawCaucus) {
    // NE is officially nonpartisan — always show caucus affiliation
    if (stateAbbr === 'NE') {
      if (caucus === 'R') return ' <span class="incumbent-marker">(caucuses with Republicans)</span>';
      if (caucus === 'D') return ' <span class="incumbent-marker">(caucuses with Democrats)</span>';
      if (caucus === 'I') return ' <span class="incumbent-marker">(Independent)</span>';
      if (caucus === 'L') return ' <span class="incumbent-marker">(Libertarian)</span>';
      return '';
    }
    // AK-style bipartisan coalition
    if (rawCaucus === 'C') return ' <span class="incumbent-marker" style="color:var(--ms-purple)">(majority coalition)</span>';
    if (!caucus || caucus === party) return '';
    return '';
  }

  // Color names by effective partisan alignment
  function displayColor(party, caucus) {
    if (stateAbbr === 'NE') return partyColorStyle(caucus || 'NP');
    return partyColorStyle(caucus || party);
  }

  // Effective party for stats/coloring: uses caucus for NE candidates
  function effectiveParty(c) {
    if (stateAbbr === 'NE' && c.caucus) return c.caucus;
    return c.party;
  }

  // Caucus annotation for candidates (not just holders)
  function candidateCaucusNote(c) {
    if (stateAbbr !== 'NE') return '';
    if (!c.caucus) return '';
    if (c.caucus === 'R') return ' <span class="incumbent-marker">(caucuses with Republicans)</span>';
    if (c.caucus === 'D') return ' <span class="incumbent-marker">(caucuses with Democrats)</span>';
    if (c.caucus === 'I') return ' <span class="incumbent-marker">(Independent)</span>';
    if (c.caucus === 'L') return ' <span class="incumbent-marker">(Libertarian)</span>';
    return '';
  }

  // Wrap candidate name in link to candidate page if ID is available
  function candLink(name, id, style) {
    if (!id) return `<span${style ? ' style="' + style + '"' : ''}>${name}</span>`;
    return `<a href="candidate.html?id=${id}&st=${stateAbbr}" style="${style || ''}text-decoration:none">${name}</a>`;
  }

  function forecastClass(rating) {
    if (!rating) return '';
    const r = rating.toLowerCase();
    if (r.includes('toss')) return 'forecast-tossup';
    if (r.includes('tilt d') || r.includes('lean d')) return 'forecast-lean-d';
    if (r.includes('tilt r') || r.includes('lean r')) return 'forecast-lean-r';
    if (r.includes('likely d') || r.includes('very likely d')) return 'forecast-likely-d';
    if (r.includes('likely r') || r.includes('very likely r')) return 'forecast-likely-r';
    if (r.includes('solid d') || r.includes('safe d')) return 'forecast-solid-d';
    if (r.includes('solid r') || r.includes('safe r')) return 'forecast-solid-r';
    return '';
  }

  function marginLabel(marginStr) {
    if (!marginStr) return '—';
    const v = parseFloat(marginStr);
    if (v > 0) return `D+${v.toFixed(1)}`;
    if (v < 0) return `R+${Math.abs(v).toFixed(1)}`;
    return 'Even';
  }

  function marginColor(marginStr) {
    if (!marginStr) return 'var(--ms-other)';
    const v = parseFloat(marginStr);
    if (v > 0) return 'var(--ms-dem-blue)';
    if (v < 0) return 'var(--ms-rep-red)';
    return 'var(--ms-other)';
  }

  const isMultiSeat = district.seats.length > 1;
  const isBlocVoting = district.uses_bloc_voting || false;
  const primarySeat = district.seats[0];

  // ==========================
  // 1. HERO SECTION
  // ==========================
  let heroHtml = `<div class="district-hero">
    <div class="district-title">${displayName}</div>
    <div class="district-subtitle">${fullLabel}</div>`;

  if (isEliminated) {
    heroHtml += `<div style="margin-top:10px;padding:8px 14px;background:var(--ms-bg-light);border-left:4px solid var(--ms-navy);color:var(--ms-text-light);font-size:14px;border-radius:4px">
      This district was eliminated after ${district.redistricting_year || ''} redistricting.</div>`;
  }

  // Current holders (skip for eliminated districts)
  if (isEliminated) {
    // No current holder display for eliminated districts
  } else if (isMultiSeat) {
    heroHtml += `<div class="holders-list">`;
    for (const s of district.seats) {
      const label = s.seat_designator ? `Seat ${s.seat_designator}` : s.seat_label;
      const dispParty = stateAbbr === 'NE' ? 'NP' : (s.current_holder_party || '—');
      const colorParty = s.current_holder_caucus || s.current_holder_party;
      const sinceStr = s.since_year ? ` &middot; Since ${s.since_year}` : '';
      const annotation = caucusAnnotation(s.current_holder_party, s.current_holder_caucus, s.raw_caucus);
      const seatPrefix = isBlocVoting ? '' : `${label} &middot; `;
      heroHtml += `<div class="holder-row">
        <span class="party-badge ${partyBadgeClass(dispParty)}">${dispParty}</span>
        <span class="holder-name" style="${displayColor(s.current_holder_party, s.current_holder_caucus)}">${s.current_holder || 'Vacant'}</span>${annotation}
        <span class="holder-since">${isBlocVoting ? (s.since_year ? `Since ${s.since_year}` : '') : label + sinceStr}</span>
      </div>`;
    }
    heroHtml += `</div>`;
  } else {
    const s = primarySeat;
    const dispParty = stateAbbr === 'NE' ? 'NP' : (s.current_holder_party || '—');
    const colorParty = s.current_holder_caucus || s.current_holder_party;
    const sinceStr = s.since_year ? `Since ${s.since_year}` : '';
    const annotation = caucusAnnotation(s.current_holder_party, s.current_holder_caucus);
    heroHtml += `<div class="holder-row">
      <span class="party-badge ${partyBadgeClass(dispParty)}">${dispParty}</span>
      <span class="holder-name" style="${displayColor(s.current_holder_party, s.current_holder_caucus)}">${s.current_holder || 'Vacant'}</span>${annotation}
      <span class="holder-since">${sinceStr}</span>
    </div>`;
  }

  // Quick stats (skip for eliminated districts)
  if (isEliminated) {
    heroHtml += `</div>`;
  } else {
  const termLen = primarySeat.term_length || '—';
  const nextElec = primarySeat.next_election || '—';
  const presMargin = district.pres_2024_margin;
  const leanColor = marginColor(presMargin);
  const shiftStr = district.partisan_shift != null
    ? (district.partisan_shift > 0 ? `D+${district.partisan_shift}` : district.partisan_shift < 0 ? `R+${Math.abs(district.partisan_shift)}` : 'No shift')
    : null;

  heroHtml += `<div class="quick-stats">
    <div class="qs-item"><span class="qs-label">Term:</span> ${termLen} years</div>
    <div class="qs-item"><span class="qs-label">Next Election:</span> ${nextElec}</div>
    <div class="qs-item"><span class="qs-label">2024 Pres:</span>
      <span class="lean-indicator" style="background:${leanColor}"></span>
      <span style="${partyColorStyle(district.pres_2024_winner)};font-weight:600">${marginLabel(presMargin)}</span>
    </div>`;
  if (shiftStr) {
    heroHtml += `<div class="qs-item"><span class="qs-label">Partisan Shift:</span> ${shiftStr}</div>`;
  }
  if (district.num_seats > 1) {
    heroHtml += `<div class="qs-item"><span class="qs-label">Seats:</span> ${district.num_seats} (multi-member)</div>`;
  }
  heroHtml += `</div></div>`;
  } // end if (!isEliminated) quick stats

  // ==========================
  // 2. PARTISAN TREND CHART
  // ==========================
  let trendHtml = '';
  // Collect general election results across all seats for trend visualization
  const allGenerals = [];
  for (const s of district.seats) {
    for (const e of s.elections) {
      if (e.type === 'General' && e.candidates && e.candidates.length > 0) {
        const winner = e.candidates.find(c => c.result === 'Won');
        if (winner) {
          const ep = effectiveParty(winner);
          const sign = ep === 'D' ? 1 : ep === 'R' ? -1 : 0;
          const uncontested = e.candidates.length === 1 || winner.pct == null;
          const rawMargin = winner.pct != null ? (winner.pct - 50) * 2 : 0;
          allGenerals.push({
            year: e.year,
            margin: uncontested ? 60 * sign : rawMargin * sign,
            party: ep,
            winner: winner.name,
            seat: s.seat_designator || '',
            uncontested,
          });
        }
      }
    }
  }
  allGenerals.sort((a, b) => a.year - b.year);

  // Deduplicate trend bars for bloc voting (all seats share the same election)
  if (isBlocVoting) {
    const seen = new Set();
    const deduped = allGenerals.filter(g => {
      const key = g.year;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    allGenerals.length = 0;
    allGenerals.push(...deduped);
  }

  if (allGenerals.length >= 2) {
    trendHtml = `<div class="section">
      <div class="section-header"><div class="section-icon">&#9650;</div><h2>Partisan Trend</h2></div>
      <div class="trend-chart-wrap"><div id="trend-chart"></div></div>
    </div>`;
  }

  // ==========================
  // 3. 2026 ELECTION CARD
  // ==========================
  let elec2026Html = '';
  const races2026 = [];
  if (!isEliminated) for (const s of district.seats) {
    if (s.next_election !== 2026) continue;
    const upcoming = s.elections.filter(e => e.year === 2026);
    const general = upcoming.find(e => e.type === 'General');
    const primaries = upcoming.filter(e => e.type.startsWith('Primary'));
    races2026.push({ seat: s, general, primaries, upcoming });
  }

  if (races2026.length > 0) {
    elec2026Html = `<div class="section"><div class="section-header"><div class="section-icon" style="background:var(--ms-rep-red)">&#9745;</div><h2>2026 Election</h2></div>`;
    // For bloc voting, show one combined card using the first race's data
    const races2026Display = isBlocVoting ? [races2026[0]] : races2026;
    for (const race of races2026Display) {
      const s = race.seat;
      const gen = race.general;
      const seatLabel = isBlocVoting ? ` (${district.num_seats} seats)` : (isMultiSeat && s.seat_designator ? ` — Seat ${s.seat_designator}` : '');

      let forecastHtml = '';
      if (s.forecast && s.forecast.length > 0) {
        for (const f of s.forecast) {
          forecastHtml += `<span class="forecast-tag ${forecastClass(f.rating)}">${f.source}: ${f.rating}</span>`;
        }
      } else if (gen && gen.forecast_rating) {
        forecastHtml = `<span class="forecast-tag ${forecastClass(gen.forecast_rating)}">${gen.forecast_rating}</span>`;
      }

      const isOpen = gen && gen.is_open_seat;
      const openTag = isOpen ? `<span class="tag" style="background:#fff3cd;color:#856404">Open Seat</span>` : '';
      const filingStr = gen && gen.filing_deadline ? `Filing deadline: ${formatDate(gen.filing_deadline)}` : '';
      const dateStr = gen && gen.date ? formatDate(gen.date) : '';
      const jungleNote = data.uses_jungle_primary ? `<span class="tag">Jungle Primary</span>` : '';

      let candsHtml = '';
      // Gather all candidates from all 2026 elections for this seat
      const allCands = [];
      for (const e of race.upcoming) {
        for (const c of e.candidates) {
          if (!allCands.find(ac => ac.name === c.name && ac.party === c.party)) {
            allCands.push({ ...c, election_type: e.type });
          }
        }
      }
      if (allCands.length > 0) {
        candsHtml = '<ul class="candidate-list">';
        for (const c of allCands) {
          const inc = c.is_incumbent ? '<span class="incumbent-marker">(incumbent)</span>' : '';
          const typeLabel = c.election_type !== 'General' ? `<span class="text-muted text-sm">${c.election_type.replace('_', ' ')}</span>` : '';
          const candParty = inferParty(c.party, c.election_type, stateAbbr);
          const ep = effectiveParty(c);
          const nameStyle = ep !== candParty ? ` style="${partyColorStyle(ep)}"` : '';
          const caucusNote = candidateCaucusNote(c);
          candsHtml += `<li><span class="party-badge ${partyBadgeClass(candParty)}" style="font-size:11px;padding:1px 6px">${candParty || '?'}</span> ${candLink(c.name, c.id, ep !== candParty ? partyColorStyle(ep) + ';' : '')}${caucusNote} ${inc} ${typeLabel}</li>`;
        }
        candsHtml += '</ul>';
      } else {
        candsHtml = '<p class="text-muted text-sm mt-8">No candidates filed yet</p>';
      }

      elec2026Html += `<div class="card election-2026-card mb-16">
        <div class="card-header">
          <h3 class="heading-sm" style="margin:0">2026 ${getChamberLabel(stateAbbr, chamber)}${seatLabel} ${forecastHtml}</h3>
          <div>${openTag} ${jungleNote}</div>
        </div>
        <div class="text-sm text-muted mt-8">${[dateStr, filingStr].filter(Boolean).join(' &middot; ')}</div>
        ${candsHtml}
      </div>`;
    }
    elec2026Html += `</div>`;
  }

  // ==========================
  // 4. ELECTION HISTORY TABLE
  // ==========================
  // --- Shared timeline rendering helpers ---

  function renderTermEventCard(te) {
    const dateStr = te.date
      ? new Date(te.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : '';
    const reasonLabels = {
      'resigned': 'Resigned',
      'died': 'Died in Office',
      'removed': 'Removed',
      'appointed_elsewhere': 'Appointed Elsewhere',
      'appointed': 'Appointed',
      'succeeded': 'Succeeded to Office',
    };
    const isArrival = te.reason === 'appointed' || te.reason === 'succeeded';
    const reasonLabel = reasonLabels[te.reason] || te.reason;
    const notesLabel = te.notes ? ` <span class="term-event-notes">${te.notes}</span>` : '';
    const badge = `<span class="party-badge ${partyBadgeClass(te.party)}" style="font-size:10px;padding:1px 5px">${te.party || '?'}</span>`;
    return `<div class="timeline-event term-event${isArrival ? ' term-arrival' : ''}">
      ${dateStr ? dateStr + ' &middot; ' : ''}<span class="term-event-reason">${reasonLabel}</span>
      &middot; ${badge} <span style="${partyColorStyle(te.party)}">${te.name}</span>${notesLabel}
    </div>`;
  }

  function renderPartySwitchCard(ps) {
    const dateStr = ps.date
      ? new Date(ps.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : '';
    const oldBadge = `<span class="party-badge ${partyBadgeClass(ps.old_party)}" style="font-size:10px;padding:1px 5px">${ps.old_party}</span>`;
    const newBadge = `<span class="party-badge ${partyBadgeClass(ps.new_party)}" style="font-size:10px;padding:1px 5px">${ps.new_party}</span>`;
    return `<div class="timeline-event party-switch-event">
      ${dateStr ? dateStr + ' &middot; ' : ''}Party Switch: <span style="${partyColorStyle(ps.new_party)}">${ps.name}</span> ${oldBadge} &rarr; ${newBadge}
    </div>`;
  }

  function renderRedistrictingCard(rd) {
    let detail = '';
    if (rd.seatChange) {
      detail = ` <span class="redistricting-detail">&middot; ${rd.seatChange}</span>`;
    } else if (rd.newMargin) {
      detail = ` <span class="redistricting-detail">&middot; New lines: ${rd.newMargin}</span>`;
    }
    const label = rd.eliminated ? 'District Eliminated' : rd.created ? 'District Created' : 'District Redrawn';
    const desc = rd.eliminated ? 'District eliminated during redistricting'
      : rd.created ? 'New district established during redistricting'
      : 'New district lines took effect';
    return `<div class="timeline-event redistricting-event">
      <span class="redistricting-label">${label}</span> &middot; ${desc}${detail}
    </div>`;
  }

  function renderElectionCard(e, containerId, rowIdx) {
    const isPrimaryTier = e.type.includes('Primary')
      || e.type.endsWith('_D') || e.type.endsWith('_R') || e.type.endsWith('_Nonpartisan');
    const isSpecial = e.type.includes('Special');
    const isPast = e.date && new Date(e.date + 'T00:00:00') < new Date();

    // Past election with 0 candidates and no results = skip
    if (isPast && e.candidates.length === 0 && !e.result_status) return '';

    // Find all winners/advancers
    const winners = e.candidates.filter(c => c.result === 'Won' || c.result === 'Advanced');
    if (winners.length === 0 && isPast && e.candidates.length === 1 && e.candidates[0].result === 'Pending') {
      winners.push(e.candidates[0]);
    }
    const hasWinner = winners.length > 0;

    // Build entry class
    let entryClass = 'timeline-entry';
    if (!isPast) entryClass += ' entry-upcoming';
    else if (isPrimaryTier) entryClass += ' entry-primary primary-muted';
    else if (isSpecial) entryClass += ' entry-special';
    else entryClass += ' entry-general';

    if (hasWinner) entryClass += ' entry-has-winner';
    else if (!isPast || !e.result_status) entryClass += ' entry-pending';

    // Header: date · type
    const typeLabel = e.type.replace(/_/g, ' ');
    let dateStr = '';
    if (e.date) {
      const d = new Date(e.date + 'T00:00:00');
      dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Forecast tag
    let forecastTag = '';
    if (e.forecast_rating) {
      forecastTag = ` <span class="forecast-tag ${forecastClass(e.forecast_rating)}" style="font-size:11px;padding:2px 8px">${e.forecast_rating}</span>`;
    }

    // Reporting status
    let reportingTag = '';
    if (e.result_status && e.result_status !== 'Certified') {
      if (e.precincts_reporting != null && e.precincts_total) {
        const pct = Math.round(e.precincts_reporting / e.precincts_total * 100);
        reportingTag = ` <span class="reporting-pct">${pct}% reporting</span>`;
      } else {
        reportingTag = ` <span class="reporting-pct">Unofficial</span>`;
      }
    }

    // Uncontested label
    const isUncontested = hasWinner && e.candidates.length === 1;
    const uncontestedTag = isUncontested ? ' <span class="incumbent-marker">(uncontested)</span>' : '';

    // Recount / close-race / runoff-triggered badge
    let recountTag = '';
    if (e.recount_eligible) {
      const rc = e.recount_eligible;
      if (rc.type === 'runoff_triggered') {
        const cutoffNote = rc.cutoff_margin != null
          ? ` | Advance margin: ${rc.cutoff_margin.toLocaleString()} votes (${rc.cutoff_margin_pct}%)`
          : '';
        recountTag = ` <span class="runoff-badge" title="Top candidates separated by ${rc.margin.toLocaleString()} votes (${rc.margin_pct}%)${cutoffNote}">Runoff Triggered</span>`;
      } else if (rc.type === 'recount') {
        recountTag = ` <span class="recount-badge" title="Margin: ${rc.margin.toLocaleString()} votes (${rc.margin_pct}%) — within ${rc.threshold_pct}% recount threshold">Potential Recount</span>`;
      } else {
        recountTag = ` <span class="close-race-badge" title="Margin: ${rc.margin.toLocaleString()} votes (${rc.margin_pct}%)">Close Race</span>`;
      }
    }

    // Incumbent defeated badge (primaries only)
    let incDefeatTag = '';
    if (e.incumbent_defeated) {
      incDefeatTag = ` <span class="incumbent-defeated-badge" title="Incumbent lost in primary">Incumbent Defeated</span>`;
    }

    // Party flip badge
    let flipTag = '';
    if (e.flipped_seat) {
      const f = e.flipped_seat;
      flipTag = ` <span class="flip-badge" title="Seat flipped from ${f.from} to ${f.to}">Flipped ${f.from}→${f.to}</span>`;
    }

    // Upcoming with candidates but no results
    const hasResults = hasWinner || e.result_status;
    let filedNote = '';
    if (!hasResults && e.candidates.length > 0) {
      const n = e.candidates.length;
      filedNote = ` <span class="text-muted">&middot; ${n} candidate${n !== 1 ? 's' : ''} filed</span>`;
    }

    let html = `<div class="${entryClass}">
      <div class="entry-header">
        <span>${dateStr}</span>
        <span class="separator">&middot;</span>
        <span class="entry-type">${typeLabel}</span>
        ${forecastTag}${reportingTag}${recountTag}${flipTag}${incDefeatTag}${uncontestedTag}${filedNote}
      </div>
      <div class="entry-candidates">`;

    // Sort candidates: Won/Advanced first, then by votes desc
    const sortedCands = e.candidates.slice().sort((a, b) => {
      const order = { Won: 0, Advanced: 1 };
      const aOrd = order[a.result] != null ? order[a.result] : 2;
      const bOrd = order[b.result] != null ? order[b.result] : 2;
      if (aOrd !== bOrd) return aOrd - bOrd;
      return (b.votes || 0) - (a.votes || 0);
    });

    // Auto-expand pending Tier 1 elections (generals/specials)
    const autoExpand = !isPrimaryTier && !hasWinner && e.candidates.length > 0;

    // Expand threshold: 6+ candidates get collapsed
    const EXPAND_THRESHOLD = 6;
    const needsExpand = !autoExpand && sortedCands.length >= EXPAND_THRESHOLD;
    const visibleCount = needsExpand ? 5 : sortedCands.length;
    const expandId = `exp-${containerId}-${rowIdx}`;

    for (let i = 0; i < sortedCands.length; i++) {
      const cand = sortedCands[i];
      const isWinner = cand.result === 'Won' || cand.result === 'Advanced';
      const rowClass = isWinner ? 'entry-cand-row winner-row' : 'entry-cand-row';
      const hiddenClass = (needsExpand && i >= visibleCount) ? ' cand-hidden' : '';
      const expandAttr = (needsExpand && i >= visibleCount) ? ` data-expand="${expandId}"` : '';

      const candParty = inferParty(cand.party, e.type, stateAbbr) || cand.party || '?';
      const ep = effectiveParty(cand);
      const badge = `<span class="party-badge ${partyBadgeClass(candParty)}" style="font-size:10px;padding:1px 5px">${candParty}</span>`;

      const incStr = cand.is_incumbent ? ' <span class="incumbent-marker" title="incumbent">(i)</span>' : '';
      const wi = cand.is_write_in ? ' <span class="incumbent-marker" title="write-in candidate">(w/i)</span>' : '';
      const caucusNote = candidateCaucusNote(cand);
      const nameHtml = `<span class="cand-name">${candLink(cand.name, cand.id, partyColorStyle(ep || candParty) + ';')}${caucusNote}${incStr}${wi}</span>`;

      const pctStr = cand.pct != null ? `${cand.pct.toFixed(1)}%` : '';
      const votesStr = cand.votes != null ? numberWithCommas(cand.votes) : '';
      let resultStr = '';
      if (cand.result === 'Won') resultStr = '<span class="cand-result-won">Won</span>';
      else if (cand.result === 'Lost') resultStr = '<span class="cand-result-lost">Lost</span>';
      else if (cand.result === 'Advanced') resultStr = '<span class="cand-result-won">Adv.</span>';
      else if (cand.result) resultStr = cand.result;

      html += `<div class="${rowClass}${hiddenClass}"${expandAttr}>
        ${badge}
        ${nameHtml}
        <span class="cand-pct">${pctStr}</span>
        <span class="cand-votes">${votesStr}</span>
        <span class="cand-result">${resultStr}</span>
      </div>`;
    }

    // Expand button
    if (needsExpand) {
      const hiddenCount = sortedCands.length - visibleCount;
      html += `<button class="expand-btn" onclick="toggleExpand('${expandId}', this)">+${hiddenCount} more</button>`;
    }

    html += `</div></div>`;
    return html;
  }

  function renderTimelineEvents(events, containerId) {
    let html = '<div class="timeline">';
    let lastYear = null;
    let rowIdx = 0;

    for (const ev of events) {
      // Year header
      if (ev.year !== lastYear) {
        html += `<div class="timeline-year">${ev.year}</div>`;
        lastYear = ev.year;
      }

      if (ev.type === 'term_event') {
        html += renderTermEventCard(ev.data);
      } else if (ev.type === 'redistricting') {
        html += renderRedistrictingCard(ev.data);
      } else if (ev.type === 'party_switch') {
        html += renderPartySwitchCard(ev.data);
      } else if (ev.type === 'election') {
        html += renderElectionCard(ev.data, containerId, rowIdx);
        rowIdx++;
      }
    }

    html += '</div>';
    return html;
  }

  function buildHistoryTable(seat, containerId) {
    const elections = seat.elections.slice().sort((a, b) => b.year - a.year || a.type.localeCompare(b.type));
    if (elections.length === 0 && (!seat.party_switches || seat.party_switches.length === 0) && (!seat.term_events || seat.term_events.length === 0)) return '<p class="text-muted">No office history available.</p>';

    const events = [];
    for (const e of elections) {
      events.push({ type: 'election', year: e.year, date: e.date || '', data: e });
    }
    for (const ps of (seat.party_switches || [])) {
      events.push({ type: 'party_switch', year: ps.year, date: ps.date || '', data: ps });
    }
    for (const te of (seat.term_events || [])) {
      events.push({ type: 'term_event', year: te.year, date: te.date || '', data: te });
    }
    // Inject redistricting events from state-level redistricting data
    const redistrictYears = (data.redistricting_cycles || {})[chamber] || [];
    const ry = district.redistricting_year;

    const elecYears = elections.map(e => e.year);
    for (const rYear of redistrictYears) {
      // effective_year = first election using NEW maps; line goes before that year
      const hasBefore = elecYears.some(y => y < rYear);
      const hasOnOrAfter = elecYears.some(y => y >= rYear);
      if (hasBefore && hasOnOrAfter) {
        const isPrimary = rYear === ry;
        const marginStr = isPrimary && district.pres_2024_margin ? marginLabel(district.pres_2024_margin) : null;
        const seatChange = isPrimary && district.old_era_seats && district.old_era_seats !== district.num_seats
          ? `${district.old_era_seats} seats \u2192 ${district.num_seats} seats` : null;
        let redistrictDate = `${rYear}-01-01`;
        const ryElecs = elections.filter(e => e.year === rYear && e.date);
        const specialDates = ryElecs.filter(e => e.type.includes('Special')).map(e => e.date).sort();
        if (specialDates.length > 0) {
          const d = new Date(specialDates[specialDates.length - 1] + 'T00:00:00');
          d.setDate(d.getDate() + 1);
          redistrictDate = d.toISOString().split('T')[0];
        }
        events.push({
          type: 'redistricting',
          year: rYear,
          date: redistrictDate,
          data: { year: rYear, newMargin: marginStr, seatChange }
        });
      } else if (rYear === ry && district.eliminated && hasBefore) {
        events.push({
          type: 'redistricting',
          year: rYear,
          date: `${rYear}-01-01`,
          data: { year: rYear, eliminated: true }
        });
      } else if (rYear === ry && district.is_new_district && hasAfter && !hasBefore) {
        events.push({
          type: 'redistricting',
          year: rYear,
          date: `${rYear}-01-01`,
          data: { year: rYear, created: true }
        });
      }
    }
    events.sort((a, b) => b.year - a.year || b.date.localeCompare(a.date));

    return renderTimelineEvents(events, containerId);
  }

  // Unified history for bloc-voting multi-member districts
  function buildUnifiedHistoryTable(district) {
    const events = [];
    const seenElections = new Set();

    for (let si = 0; si < district.seats.length; si++) {
      const seat = district.seats[si];
      for (const e of seat.elections) {
        const isSpecial = e.type.includes('Special');
        const dedupKey = isSpecial ? `${e.year}-${e.type}-${e.date}-s${si}` : `${e.year}-${e.type}-${e.date}`;
        if (seenElections.has(dedupKey)) continue;
        seenElections.add(dedupKey);
        events.push({ type: 'election', year: e.year, date: e.date || '', data: e });
      }
      for (const ps of (seat.party_switches || [])) {
        events.push({ type: 'party_switch', year: ps.year, date: ps.date || '', data: ps });
      }
      for (const te of (seat.term_events || [])) {
        events.push({ type: 'term_event', year: te.year, date: te.date || '', data: te });
      }
    }

    // Inject redistricting events from state-level redistricting data
    const redistrictYears2 = (data.redistricting_cycles || {})[chamber] || [];
    const ry2 = district.redistricting_year;

    const elecYears2 = events.filter(ev => ev.type === 'election').map(ev => ev.year);
    for (const rYear of redistrictYears2) {
      // effective_year = first election using NEW maps; line goes before that year
      const hasBefore = elecYears2.some(y => y < rYear);
      const hasOnOrAfter = elecYears2.some(y => y >= rYear);
      if (hasBefore && hasOnOrAfter) {
        const isPrimary = rYear === ry2;
        const marginStr = isPrimary && district.pres_2024_margin ? marginLabel(district.pres_2024_margin) : null;
        const seatChange = isPrimary && district.old_era_seats && district.old_era_seats !== district.num_seats
          ? `${district.old_era_seats} seats \u2192 ${district.num_seats} seats` : null;
        let redistrictDate = `${rYear}-01-01`;
        const ryElecs = events.filter(ev => ev.type === 'election' && ev.year === rYear && ev.data.date);
        const specialDates = ryElecs.filter(ev => ev.data.type.includes('Special')).map(ev => ev.data.date).sort();
        if (specialDates.length > 0) {
          const d = new Date(specialDates[specialDates.length - 1] + 'T00:00:00');
          d.setDate(d.getDate() + 1);
          redistrictDate = d.toISOString().split('T')[0];
        }
        events.push({
          type: 'redistricting',
          year: rYear,
          date: redistrictDate,
          data: { year: rYear, newMargin: marginStr, seatChange }
        });
      } else if (rYear === ry2 && district.eliminated && hasBefore) {
        events.push({
          type: 'redistricting',
          year: rYear,
          date: `${rYear}-01-01`,
          data: { year: rYear, eliminated: true }
        });
      } else if (rYear === ry2 && district.is_new_district && hasAfter && !hasBefore) {
        events.push({
          type: 'redistricting',
          year: rYear,
          date: `${rYear}-01-01`,
          data: { year: rYear, created: true }
        });
      }
    }

    if (events.length === 0) return '<p class="text-muted">No office history available.</p>';

    events.sort((a, b) => b.year - a.year || b.date.localeCompare(a.date));

    return renderTimelineEvents(events, 'unified');
  }

  let historyHtml = `<div class="section"><div class="section-header"><div class="section-icon">&#9201;</div><h2>Office History</h2></div>`;

  if (isMultiSeat && isBlocVoting) {
    // Bloc voting: single unified table, no seat tabs
    historyHtml += buildUnifiedHistoryTable(district);
  } else if (isMultiSeat) {
    // Position-based multi-member: keep per-seat tabs
    historyHtml += `<div class="seat-tabs" id="seat-tabs">`;
    for (let i = 0; i < district.seats.length; i++) {
      const s = district.seats[i];
      const label = s.seat_designator ? `Seat ${s.seat_designator}` : s.seat_label;
      historyHtml += `<button class="seat-tab${i === 0 ? ' active' : ''}" onclick="switchSeatTab(${i})">${label}</button>`;
    }
    historyHtml += `</div>`;
    for (let i = 0; i < district.seats.length; i++) {
      historyHtml += `<div class="seat-panel${i === 0 ? ' active' : ''}" data-seat-idx="${i}">`;
      historyHtml += buildHistoryTable(district.seats[i], `s${i}`);
      historyHtml += `</div>`;
    }
  } else {
    historyHtml += buildHistoryTable(primarySeat, 's0');
  }
  historyHtml += `</div>`;

  // ==========================
  // 5. DISTRICT MAP
  // ==========================
  const mapHtml = `<div class="section">
    <div class="section-header"><div class="section-icon">&#9673;</div><h2>District Map</h2></div>
    <div id="district-map"></div>
  </div>`;

  // ==========================
  // 6. SIMILAR DISTRICTS
  // ==========================
  let similarHtml = '';
  if (district.similar_districts && district.similar_districts.length > 0) {
    similarHtml = `<div class="section"><div class="section-header"><div class="section-icon">&#9776;</div><h2>Similar Districts</h2></div>
      <p class="body-text mb-16">Districts from other states with a similar 2024 presidential margin (same chamber type).</p>
      <div class="similar-grid">`;
    for (const sim of district.similar_districts) {
      const simStateName = STATE_NAMES[sim.state] || sim.state;
      const simDisplay = sim.district_name || `${sim.chamber} ${sim.district_number}`;
      const simColor = marginColor(sim.pres_margin);
      similarHtml += `<a href="district.html?st=${sim.state}&chamber=${sim.chamber}&d=${encodeURIComponent(sim.district_number)}" class="card similar-card">
        <div class="sim-name">${simDisplay}</div>
        <div class="sim-state">${simStateName}</div>
        <div class="sim-margin" style="color:${simColor}">${marginLabel(sim.pres_margin)}</div>
      </a>`;
    }
    similarHtml += `</div></div>`;
  }

  // ==========================
  // 7. PREV/NEXT NAVIGATION
  // ==========================
  // Find adjacent districts in same chamber
  const sameChamber = data.districts.filter(d => d.chamber === chamber);
  const idx = sameChamber.findIndex(d => d.district_number === distNum);
  const prev = idx > 0 ? sameChamber[idx - 1] : null;
  const next = idx < sameChamber.length - 1 ? sameChamber[idx + 1] : null;

  let navHtml = `<div class="district-nav">
    <span>${prev ? `<a href="district.html?st=${stateAbbr}&chamber=${chamber}&d=${encodeURIComponent(prev.district_number)}">&larr; ${prev.district_name || 'Dist. ' + prev.district_number}</a>` : ''}</span>
    <a href="state.html?st=${stateAbbr}">Back to ${stateName}</a>
    <span>${next ? `<a href="district.html?st=${stateAbbr}&chamber=${chamber}&d=${encodeURIComponent(next.district_number)}">${next.district_name || 'Dist. ' + next.district_number} &rarr;</a>` : ''}</span>
  </div>`;

  // ==========================
  // RENDER
  // ==========================
  content.innerHTML = heroHtml + trendHtml + elec2026Html + historyHtml + mapHtml + similarHtml + navHtml;

  // ==========================
  // BUILD TREND CHART (SVG)
  // ==========================
  if (allGenerals.length >= 2) {
    buildTrendChart(allGenerals, district.pres_2024_margin);
  }

  function buildTrendChart(elections, presMargin) {
    const container = document.getElementById('trend-chart');
    if (!container) return;

    const years = [...new Set(elections.map(e => e.year))].sort();
    const minYear = years[0];
    const maxYear = years[years.length - 1];

    // Count max bars per year (multi-member districts have multiple elections per year)
    const byYearCount = {};
    for (const e of elections) { byYearCount[e.year] = (byYearCount[e.year] || 0) + 1; }
    const maxBarsPerYear = Math.max(...Object.values(byYearCount));

    const H = 200;
    const PAD_L = 70, PAD_R = 80, PAD_T = 20, PAD_B = 30;
    const maxMargin = 60;
    // Scale width per year based on how many bars need to fit
    const perYear = Math.max(70, maxBarsPerYear * 20 + 30);
    const W = Math.max(500, years.length * perYear + 160);
    const chartW = W - PAD_L - PAD_R;
    const chartH = H - PAD_T - PAD_B;
    // Bar width: scale down for multi-member districts; ensure groups don't overlap adjacent years
    const rawBarW = Math.min(40, chartW / years.length * 0.5 / Math.max(1, maxBarsPerYear * 0.4));
    const maxBarForSpacing = years.length > 1
      ? (chartW / (years.length + 1) - (maxBarsPerYear - 1) * 3) / maxBarsPerYear * 0.85
      : 40;
    const barW = Math.max(8, Math.min(rawBarW, maxBarForSpacing));

    // Inner margin keeps first/last bar groups from overlapping axis labels
    const maxGroupW = barW * maxBarsPerYear + (maxBarsPerYear - 1) * 3;
    const INNER = maxGroupW / 2 + 6;
    function xPos(year) {
      if (years.length === 1) return PAD_L + chartW / 2;
      return PAD_L + INNER + ((year - minYear) / (maxYear - minYear)) * (chartW - INNER * 2);
    }
    function yPos(margin) {
      const clamped = Math.max(-maxMargin, Math.min(maxMargin, margin));
      return PAD_T + chartH / 2 - (clamped / maxMargin) * (chartH / 2);
    }

    let svg = `<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:${W}px;overflow:hidden">`;

    // Stripe pattern for uncontested bars
    svg += `<defs>
      <pattern id="uc-stripes-d" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
        <rect width="6" height="6" fill="var(--ms-dem-blue)" opacity="0.25"/>
        <line x1="0" y1="0" x2="0" y2="6" stroke="var(--ms-dem-blue)" stroke-width="2" opacity="0.5"/>
      </pattern>
      <pattern id="uc-stripes-r" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
        <rect width="6" height="6" fill="var(--ms-rep-red)" opacity="0.25"/>
        <line x1="0" y1="0" x2="0" y2="6" stroke="var(--ms-rep-red)" stroke-width="2" opacity="0.5"/>
      </pattern>
      <pattern id="uc-stripes-o" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
        <rect width="6" height="6" fill="var(--ms-other)" opacity="0.25"/>
        <line x1="0" y1="0" x2="0" y2="6" stroke="var(--ms-other)" stroke-width="2" opacity="0.5"/>
      </pattern>
    </defs>`;

    // Grid lines
    const zeroY = yPos(0);
    svg += `<line x1="${PAD_L}" y1="${zeroY}" x2="${W - PAD_R}" y2="${zeroY}" stroke="#ccc" stroke-width="1"/>`;
    for (const m of [20, 40]) {
      const yD = yPos(m);
      const yR = yPos(-m);
      const sw = m === 40 ? '0.8' : '0.5';
      svg += `<line x1="${PAD_L}" y1="${yD}" x2="${W - PAD_R}" y2="${yD}" stroke="#ddd" stroke-width="${sw}"/>`;
      svg += `<line x1="${PAD_L}" y1="${yR}" x2="${W - PAD_R}" y2="${yR}" stroke="#ddd" stroke-width="${sw}"/>`;
    }

    // Y-axis labels
    svg += `<text x="${PAD_L - 8}" y="${yPos(0) + 4}" text-anchor="end" font-size="10" fill="#999" font-family="Work Sans,sans-serif">Even</text>`;
    svg += `<text x="${PAD_L - 8}" y="${yPos(20) + 4}" text-anchor="end" font-size="10" fill="var(--ms-dem-blue)" font-family="Work Sans,sans-serif">D+20</text>`;
    svg += `<text x="${PAD_L - 8}" y="${yPos(40) + 4}" text-anchor="end" font-size="10" fill="var(--ms-dem-blue)" font-family="Work Sans,sans-serif">D+40</text>`;
    svg += `<text x="${PAD_L - 8}" y="${yPos(-20) + 4}" text-anchor="end" font-size="10" fill="var(--ms-rep-red)" font-family="Work Sans,sans-serif">R+20</text>`;
    svg += `<text x="${PAD_L - 8}" y="${yPos(-40) + 4}" text-anchor="end" font-size="10" fill="var(--ms-rep-red)" font-family="Work Sans,sans-serif">R+40</text>`;

    // Presidential margin dashed line
    if (presMargin) {
      const pmVal = parseFloat(presMargin);
      const pmY = yPos(pmVal);
      svg += `<line x1="${PAD_L}" y1="${pmY}" x2="${W - PAD_R}" y2="${pmY}" stroke="var(--ms-other)" stroke-width="1.5" stroke-dasharray="6,4"/>`;
      svg += `<text x="${W - PAD_R + 4}" y="${pmY + 4}" font-size="10" fill="var(--ms-other)" font-family="Work Sans,sans-serif">2024 Pres</text>`;
    }

    // Redistricting vertical lines
    const chartRedistrictYears = (data.redistricting_cycles || {})[district.chamber] || [];
    for (const ry of chartRedistrictYears) {
      // effective_year = first election using new maps, so line goes BEFORE that election
      const hasElecBefore = years.some(y => y < ry);
      const hasElecOnOrAfter = years.some(y => y >= ry);
      if (hasElecBefore && hasElecOnOrAfter && ry >= minYear && ry <= maxYear) {
        // Position line between the last pre-redistricting election and the redistricting year
        const prevYear = years.filter(y => y < ry).sort((a,b) => b-a)[0];
        const rx = prevYear ? (xPos(prevYear) + xPos(ry)) / 2 : xPos(ry) - perYear * 0.5;
        svg += `<line x1="${rx}" y1="${PAD_T}" x2="${rx}" y2="${H - PAD_B}" stroke="var(--ms-navy)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>`;
        svg += `<text x="${rx}" y="${PAD_T - 4}" text-anchor="middle" font-size="9" fill="var(--ms-navy)" font-family="Work Sans,sans-serif" opacity="0.7">Redistricted</text>`;
      }
    }

    // Bars — group by year (multi-member can have multiple elections same year)
    const byYear = {};
    for (const e of elections) {
      byYear[e.year] = byYear[e.year] || [];
      byYear[e.year].push(e);
    }

    for (const year of years) {
      const entries = byYear[year];
      const totalBars = entries.length;
      const groupW = barW * totalBars + (totalBars - 1) * 3;
      const startX = xPos(year) - groupW / 2;

      entries.forEach((e, i) => {
        const bx = startX + i * (barW + 3);
        const margin = e.margin;
        const barTop = Math.min(yPos(margin), zeroY);
        const barBot = Math.max(yPos(margin), zeroY);
        const barH = Math.max(barBot - barTop, 2);

        if (e.uncontested) {
          // Uncontested: striped bar with lower opacity
          const patternId = e.party === 'D' ? 'uc-stripes-d' : e.party === 'R' ? 'uc-stripes-r' : 'uc-stripes-o';
          svg += `<rect x="${bx}" y="${barTop}" width="${barW}" height="${barH}" fill="url(#${patternId})" rx="2">
            <title>${e.winner} (${e.party}) — Uncontested</title>
          </rect>`;
          // "UC" label above/below bar
          const ucY = e.margin > 0 ? barTop - 4 : barBot + 11;
          svg += `<text x="${bx + barW / 2}" y="${ucY}" text-anchor="middle" font-size="8" fill="#999" font-family="Work Sans,sans-serif">UC</text>`;
        } else {
          const color = e.party === 'D' ? 'var(--ms-dem-blue)' : e.party === 'R' ? 'var(--ms-rep-red)' : 'var(--ms-other)';
          svg += `<rect x="${bx}" y="${barTop}" width="${barW}" height="${barH}" fill="${color}" rx="2" opacity="0.85">
            <title>${e.winner} (${e.party}) ${e.margin > 0 ? 'D' : 'R'}+${Math.abs(e.margin).toFixed(1)}</title>
          </rect>`;
        }
      });

      // Year label
      svg += `<text x="${xPos(year)}" y="${H - 6}" text-anchor="middle" font-size="11" fill="#666" font-family="Work Sans,sans-serif">${year}</text>`;
    }

    svg += '</svg>';
    container.innerHTML = svg;
  }

  // ==========================
  // DISTRICT MAP (Leaflet)
  // ==========================
  loadDistrictMap();

  async function loadDistrictMap() {
    const mapEl = document.getElementById('district-map');
    if (!mapEl) return;

    // NE unicameral Legislature uses 'upper' geo file (Census SLDU)
    const chamberType = (chamber === 'Senate' || chamber === 'Legislature') ? 'upper' : 'lower';
    let geoData;
    try {
      geoData = await loadJSON(`data/geo/${stateAbbr}_${chamberType}.json`);
    } catch (e) {
      mapEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--ms-text-light);font-size:14px">District map not yet available</div>';
      return;
    }

    const map = L.map('district-map', { scrollWheelZoom: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18,
    }).addTo(map);

    // Build the match key for this district in Census GeoJSON
    // Census uses SLDUST/SLDLST fields:
    //   Numeric districts: zero-padded "009"
    //   AK Senate: letters like "00A" through "00T"
    //   Named districts (VT, MA, NH): abbreviation codes
    const distLetter = district.district_name ? district.district_name.replace(/^[A-Z]+-/, '') : '';

    function isDistrictMatch(feature) {
      const props = feature.properties || {};
      const geoDist = props.SLDUST || props.SLDLST || '';
      const geoName = props.NAMELSAD || '';
      const geoNameLower = geoName.toLowerCase();
      const distLower = distNum.toLowerCase();

      // AK Senate: match letter from district_name (SD-A → "00A")
      if (stateAbbr === 'AK' && chamber === 'Senate' && distLetter.length === 1) {
        return geoDist === '00' + distLetter || geoName.endsWith(' ' + distLetter);
      }

      // Named districts (NH, VT, etc.): convert "Belknap-4" to match "Belknap 04"
      // by splitting on dash, zero-padding the numeric suffix, and checking NAMELSAD
      const dashIdx = distNum.lastIndexOf('-');
      if (dashIdx > 0) {
        const prefix = distNum.substring(0, dashIdx);
        const suffix = distNum.substring(dashIdx + 1);
        const paddedSuffix = suffix.padStart(2, '0');
        const namedPattern = (prefix + ' ' + paddedSuffix).toLowerCase();
        if (geoNameLower.includes(namedPattern)) return true;
        // Also try unpadded
        if (geoNameLower.includes((prefix + ' ' + suffix).toLowerCase())) return true;
      }

      return geoDist === distNum
        || geoDist === distNum.padStart(3, '0')
        || geoDist === distNum.padStart(2, '0')
        || geoName.endsWith(' ' + distNum)
        || geoName.endsWith(' ' + distNum.replace(/^0+/, ''))
        || geoNameLower.startsWith(distLower + ' ')
        || geoNameLower.startsWith(distLower + '-');
    }

    let targetFeature = null;
    const targetColor = marginColor(district.pres_2024_margin);

    const allLayer = L.geoJSON(geoData, {
      style: function(feature) {
        if (isDistrictMatch(feature)) {
          targetFeature = feature;
          return {
            color: targetColor,
            weight: 3,
            fillColor: targetColor,
            fillOpacity: 0.3,
          };
        }
        return {
          color: '#999',
          weight: 1,
          fillColor: '#e8e8e8',
          fillOpacity: 0.15,
        };
      },
      onEachFeature: function(feature, layer) {
        const props = feature.properties || {};
        const name = props.NAMELSAD || props.NAME || '';
        layer.bindTooltip(name, { sticky: true });
      }
    }).addTo(map);

    // Zoom to target district, or fit all if not found
    if (targetFeature) {
      const targetLayer = L.geoJSON(targetFeature);
      map.fitBounds(targetLayer.getBounds(), { padding: [40, 40] });
    } else {
      // For AK, the full state crosses the antimeridian — use manual bounds
      if (stateAbbr === 'AK') {
        map.fitBounds([[51, -175], [72, -130]]);
      } else {
        map.fitBounds(allLayer.getBounds(), { padding: [20, 20] });
      }
    }
  }

})();

// Global functions for interactivity
function toggleExpand(id, btn) {
  const items = document.querySelectorAll(`[data-expand="${id}"]`);
  const isOpen = items[0] && items[0].classList.contains('open');
  items.forEach(r => r.classList.toggle('open'));
  if (btn) {
    btn.textContent = isOpen ? `+${items.length} more` : 'Hide';
  }
}

function switchSeatTab(idx) {
  document.querySelectorAll('.seat-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.seat-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
}
</script>
</body>
</html>
