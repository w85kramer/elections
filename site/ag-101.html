<script src="js/map-component.js"></script>
<script>
(async function() {
  // Inline map
  var agData = await loadJSON('data/ag_2026.json');
  var mapData = {};
  var mapColors = { 'D': '#6cb3d2', 'R': '#e50963' };
  for (var i = 0; i < agData.races.length; i++) {
    var r = agData.races[i];
    mapData[r.state] = { category: r.incumbent_party, info: r };
  }
  new MapRenderer('#page-map', {
    data: mapData,
    colors: mapColors,
    defaultColor: '#e4e4e4',
    legend: [
      { label: 'Democratic AG', color: '#6cb3d2' },
      { label: 'Republican AG', color: '#e50963' },
      { label: 'No Elected AG', color: '#e4e4e4' }
    ],
    tooltipFn: function(abbr, info) {
      if (!info.state_name) return abbr;
      return '<strong>' + info.state_name + '</strong><br>AG: ' + (info.incumbent || 'N/A') + ' (' + info.incumbent_party + ')';
    }
  });
})();
</script>
