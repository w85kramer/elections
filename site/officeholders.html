<style>
  .page-header {
    margin-bottom: 24px;
  }
  .page-header h1 {
    font-weight: 800; font-size: 32px;
    color: var(--ms-navy); margin-bottom: 4px;
  }
  .page-header .subtitle {
    font-size: 15px; color: var(--ms-text-light);
  }
  .oh-stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .filters-bar {
    display: flex; flex-wrap: wrap; gap: 12px;
    align-items: flex-end; margin-bottom: 16px;
  }
  .filter-group label {
    display: block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--ms-text-light); margin-bottom: 4px;
  }
  .filter-group select, .filter-group input {
    padding: 8px 12px; border: 1px solid var(--ms-border);
    border-radius: var(--ms-radius); font-size: 14px;
    font-family: 'Work Sans', sans-serif;
  }
  .results-count {
    font-size: 13px; color: var(--ms-text-light);
    margin-bottom: 12px;
  }
  .oh-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--ms-border);
    border-radius: var(--ms-radius);
  }
  .oh-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .oh-table th {
    background: var(--ms-navy);
    color: white;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  .oh-table th:hover { background: #0a4d78; }
  .oh-table th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  .oh-table th.sorted .sort-arrow { opacity: 1; }
  .oh-table td {
    padding: 8px 14px;
    border-bottom: 1px solid #f0f0f0;
    white-space: nowrap;
  }
  .oh-table tr:hover td { background: #f8f9fa; }
  .oh-table .party-cell {
    font-weight: 700;
  }
  .oh-table .party-d { color: var(--ms-dem-blue); }
  .oh-table .party-r { color: var(--ms-rep-red); }
  .oh-table .party-other { color: #888; }
  .oh-table .name-cell a {
    color: var(--ms-navy); text-decoration: none; font-weight: 600;
  }
  .oh-table .name-cell a:hover { text-decoration: underline; }
  .oh-table .office-cell { color: var(--ms-text-light); }
  .table-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; font-size: 13px; color: var(--ms-text-light);
  }
  .page-btn {
    padding: 6px 14px; border: 1px solid var(--ms-border);
    border-radius: var(--ms-radius); background: white;
    font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--ms-navy); font-family: 'Work Sans', sans-serif;
  }
  .page-btn:hover { background: #f0f0f0; }
  .page-btn:disabled { opacity: 0.4; cursor: default; }
  .page-btns { display: flex; gap: 6px; }
  .export-btn {
    display: inline-block; padding: 8px 16px;
    background: var(--ms-navy); color: white;
    border: none; border-radius: var(--ms-radius);
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Work Sans', sans-serif;
  }
  .export-btn:hover { background: #0a4d78; }
  @media (max-width: 768px) {
    .oh-stats { grid-template-columns: repeat(3, 1fr); }
    .oh-table td, .oh-table th { padding: 6px 8px; font-size: 12px; }
  }
</style>

<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="global-nav"></div>
<div class="page-container" id="main-content" role="main">

  <div class="page-header">
    <h1>Current Officeholders</h1>
    <p class="subtitle">All elected state officials across 50 states</p>
  </div>

  <!-- Stats -->
  <div class="oh-stats">
    <div class="card stat-card"><div class="stat-number" id="stat-total">—</div><div class="stat-label">Total Officials</div></div>
    <div class="card stat-card"><div class="stat-number" id="stat-legislators">—</div><div class="stat-label">Legislators</div></div>
    <div class="card stat-card"><div class="stat-number" id="stat-govs">—</div><div class="stat-label">Governors</div></div>
    <div class="card stat-card"><div class="stat-number" id="stat-dem" style="color:var(--ms-dem-blue)">—</div><div class="stat-label">Democrats</div></div>
    <div class="card stat-card"><div class="stat-number" id="stat-rep" style="color:var(--ms-rep-red)">—</div><div class="stat-label">Republicans</div></div>
  </div>

  <!-- Filters -->
  <div class="filters-bar">
    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="filter-search" placeholder="Name or district..." style="width:180px">
    </div>
    <div class="filter-group">
      <label>State</label>
      <select id="filter-state"><option value="">All States</option></select>
    </div>
    <div class="filter-group">
      <label>Office</label>
      <select id="filter-office">
        <option value="">All Offices</option>
        <option value="Governor">Governor</option>
        <option value="Lt. Governor">Lt. Governor</option>
        <option value="Attorney General">Attorney General</option>
        <option value="Secretary of State">Secretary of State</option>
        <option value="Treasurer">Treasurer</option>
        <option value="State Senate">State Senate</option>
        <option value="State House">State House</option>
        <option value="State Legislature">State Legislature</option>
        <option value="statewide_other">Other Statewide</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Party</label>
      <select id="filter-party">
        <option value="">All Parties</option>
        <option value="D">Democrat</option>
        <option value="R">Republican</option>
        <option value="other">Other / Independent</option>
      </select>
    </div>
    <div class="filter-group" style="margin-left:auto">
      <button class="export-btn" id="export-btn">Export CSV</button>
    </div>
  </div>

  <div class="results-count" id="results-count"></div>

  <!-- Table -->
  <div class="oh-table-wrap">
    <table class="oh-table" id="oh-table">
      <thead>
        <tr>
          <th data-col="state">State <span class="sort-arrow">&#9650;</span></th>
          <th data-col="name">Name <span class="sort-arrow">&#9650;</span></th>
          <th data-col="party">Party <span class="sort-arrow">&#9650;</span></th>
          <th data-col="office">Office <span class="sort-arrow">&#9650;</span></th>
          <th data-col="district">District <span class="sort-arrow">&#9650;</span></th>
        </tr>
      </thead>
      <tbody id="oh-body"></tbody>
    </table>
  </div>

  <div class="table-footer">
    <div id="page-info"></div>
    <div class="page-btns">
      <button class="page-btn" id="btn-prev" disabled>&larr; Previous</button>
      <button class="page-btn" id="btn-next">Next &rarr;</button>
    </div>
  </div>

</div>

<div id="global-footer"></div>

<script src="js/nav.js"></script>
<script src="js/common.js"></script>
<script>
(async function() {
  var data = await loadJSON('data/officeholders.json');
  var all = data.officeholders;
  var PAGE_SIZE = 100;
  var currentPage = 0;
  var sortCol = 'state';
  var sortAsc = true;
  var filtered = all.slice();

  var STATE_NAMES = {};
  // Build state names from data
  var statesInData = {};
  for (var i = 0; i < all.length; i++) {
    statesInData[all[i].state] = true;
  }

  var _gd = document.getElementById('gen-date') || document.getElementById('gen-date-footer');
  if (_gd) _gd.textContent = formatDate(data.generated_at.split('T')[0]);

  // Stats
  var dems = 0, reps = 0, legislators = 0, govs = 0;
  for (var i = 0; i < all.length; i++) {
    var o = all[i];
    if (o.party === 'D') dems++;
    else if (o.party === 'R') reps++;
    if (o.office === 'State House' || o.office === 'State Senate' || o.office === 'State Legislature') legislators++;
    if (o.office === 'Governor') govs++;
  }
  document.getElementById('stat-total').textContent = numberWithCommas(all.length);
  document.getElementById('stat-legislators').textContent = numberWithCommas(legislators);
  document.getElementById('stat-govs').textContent = govs;
  document.getElementById('stat-dem').textContent = numberWithCommas(dems);
  document.getElementById('stat-rep').textContent = numberWithCommas(reps);

  // Populate state filter
  var stateSelect = document.getElementById('filter-state');
  var abbrs = Object.keys(statesInData).sort();
  for (var i = 0; i < abbrs.length; i++) {
    var opt = document.createElement('option');
    opt.value = abbrs[i];
    opt.textContent = abbrs[i];
    stateSelect.appendChild(opt);
  }

  // Filter logic
  function applyFilters() {
    var search = document.getElementById('filter-search').value.toLowerCase();
    var state = document.getElementById('filter-state').value;
    var office = document.getElementById('filter-office').value;
    var party = document.getElementById('filter-party').value;

    filtered = all.filter(function(o) {
      if (state && o.state !== state) return false;
      if (party === 'D' && o.party !== 'D') return false;
      if (party === 'R' && o.party !== 'R') return false;
      if (party === 'other' && (o.party === 'D' || o.party === 'R')) return false;
      if (office === 'statewide_other') {
        if (o.office === 'State House' || o.office === 'State Senate' || o.office === 'State Legislature' ||
            o.office === 'Governor' || o.office === 'Lt. Governor' || o.office === 'Attorney General' || o.office === 'Secretary of State') return false;
      } else if (office && o.office !== office) return false;
      if (search && o.name.toLowerCase().indexOf(search) === -1 && o.district.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });

    applySort();
    currentPage = 0;
    renderTable();
  }

  // Sort logic
  function applySort() {
    filtered.sort(function(a, b) {
      var va = a[sortCol] || '';
      var vb = b[sortCol] || '';
      // Numeric sort for district if possible
      if (sortCol === 'district') {
        var na = parseInt(va), nb = parseInt(vb);
        if (!isNaN(na) && !isNaN(nb)) {
          return sortAsc ? na - nb : nb - na;
        }
      }
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      // Secondary sort by name
      if (a.name < b.name) return -1;
      if (a.name > b.name) return 1;
      return 0;
    });
  }

  // Render
  function renderTable() {
    var start = currentPage * PAGE_SIZE;
    var end = Math.min(start + PAGE_SIZE, filtered.length);
    var tbody = document.getElementById('oh-body');
    var html = '';

    for (var i = start; i < end; i++) {
      var o = filtered[i];
      var partyClass = o.party === 'D' ? 'party-d' : o.party === 'R' ? 'party-r' : 'party-other';
      var partyLabel = o.party === 'D' ? 'D' : o.party === 'R' ? 'R' : o.party || '—';
      var districtLabel = o.district === 'Statewide' ? '' : o.district;
      var link = o.office === 'Governor' ? 'state.html?st=' + o.state :
                 (o.office === 'State Senate' || o.office === 'State House' || o.office === 'State Legislature') ?
                 'district.html?st=' + o.state + '&chamber=' + encodeURIComponent(o.chamber) + '&district=' + encodeURIComponent(o.district) :
                 'state.html?st=' + o.state;

      html += '<tr>' +
        '<td>' + o.state + '</td>' +
        '<td class="name-cell"><a href="' + link + '">' + o.name + '</a></td>' +
        '<td class="party-cell ' + partyClass + '">' + partyLabel + '</td>' +
        '<td class="office-cell">' + o.office + '</td>' +
        '<td>' + districtLabel + '</td>' +
        '</tr>';
    }
    tbody.innerHTML = html;

    document.getElementById('results-count').textContent =
      numberWithCommas(filtered.length) + ' officeholder' + (filtered.length !== 1 ? 's' : '') +
      (filtered.length < all.length ? ' (filtered from ' + numberWithCommas(all.length) + ')' : '');

    document.getElementById('page-info').textContent =
      'Showing ' + (start + 1) + '–' + end + ' of ' + numberWithCommas(filtered.length);

    document.getElementById('btn-prev').disabled = currentPage === 0;
    document.getElementById('btn-next').disabled = end >= filtered.length;
  }

  // Sort headers
  document.querySelectorAll('.oh-table th').forEach(function(th) {
    th.addEventListener('click', function() {
      var col = th.getAttribute('data-col');
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }
      // Update arrows
      document.querySelectorAll('.oh-table th').forEach(function(h) {
        h.classList.remove('sorted');
        h.querySelector('.sort-arrow').innerHTML = '&#9650;';
      });
      th.classList.add('sorted');
      th.querySelector('.sort-arrow').innerHTML = sortAsc ? '&#9650;' : '&#9660;';

      applySort();
      currentPage = 0;
      renderTable();
    });
  });

  // Filter events
  document.getElementById('filter-search').addEventListener('input', applyFilters);
  document.getElementById('filter-state').addEventListener('change', applyFilters);
  document.getElementById('filter-office').addEventListener('change', applyFilters);
  document.getElementById('filter-party').addEventListener('change', applyFilters);

  // Pagination
  document.getElementById('btn-prev').addEventListener('click', function() {
    if (currentPage > 0) { currentPage--; renderTable(); window.scrollTo(0, 0); }
  });
  document.getElementById('btn-next').addEventListener('click', function() {
    if ((currentPage + 1) * PAGE_SIZE < filtered.length) { currentPage++; renderTable(); window.scrollTo(0, 0); }
  });

  // CSV export
  document.getElementById('export-btn').addEventListener('click', function() {
    var csv = 'State,Name,Party,Office,District\n';
    for (var i = 0; i < filtered.length; i++) {
      var o = filtered[i];
      csv += o.state + ',"' + o.name.replace(/"/g, '""') + '",' + o.party + ',"' + o.office + '","' + o.district + '"\n';
    }
    var blob = new Blob([csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'officeholders.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

  // Initial render
  applyFilters();

})();
</script>
</body>
</html>
